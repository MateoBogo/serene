<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Statistiques</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Statistiques</ion-title>
    </ion-toolbar>
  </ion-header>

  <main class="page">
    <section class="panel">
      <h1>Semaine en cours</h1>
      <div class="stats">
        <article>
          <strong>30</strong>
          <span>minutes</span>
        </article>
        <article>
          <strong>3</strong>
          <span>sessions</span>
        </article>
        <article>
          <strong>10</strong>
          <span>min en moyenne</span>
        </article>
      </div>
      <p>
        Pour l'instant les chiffres sont fixes. La prochaine étape sera de les
        calculer depuis l'historique enregistré dans le téléphone.
      </p>
      <a href="/">Retour à l'accueil</a>
    </section>
  </main>
</ion-content>
